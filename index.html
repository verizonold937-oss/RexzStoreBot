<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rexz Hub - Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background Ornaments */
        .bg-ornament {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .circle {
            position: absolute;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        .circle1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        .circle2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -150px;
            animation-delay: -5s;
        }
        
        .circle3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            33% {
                transform: translateY(-30px) translateX(20px);
            }
            66% {
                transform: translateY(20px) translateX(-20px);
            }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: particleMove 10s infinite linear;
        }
        
        @keyframes particleMove {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Main Card */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo Animation */
        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: pulse 2s infinite, rotate 4s linear infinite;
            display: inline-block;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 0px rgba(0,0,0,0);
            }
            50% {
                transform: scale(1.1);
                text-shadow: 0 0 20px rgba(37,211,102,0.5);
            }
        }
        
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        h1 {
            background: linear-gradient(135deg, #075e54, #128c7e, #25D366);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            font-size: 2rem;
            letter-spacing: 2px;
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
        }
        
        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 35px;
            font-size: 0.9rem;
            position: relative;
            display: inline-block;
        }
        
        .subtitle::before,
        .subtitle::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #25D366, transparent);
            top: 50%;
        }
        
        .subtitle::before {
            right: 100%;
            margin-right: 15px;
        }
        
        .subtitle::after {
            left: 100%;
            margin-left: 15px;
        }
        
        /* Button Styles */
        .wa-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #25D366, #128c7e);
            color: white;
            text-decoration: none;
            padding: 18px 25px;
            margin: 18px 0;
            border-radius: 60px;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 8px 20px rgba(37,211,102,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .wa-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .wa-button:hover::before {
            left: 100%;
        }
        
        .wa-button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(37,211,102,0.4);
        }
        
        .button-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .button-left i {
            font-size: 1.6rem;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }
        
        .name {
            background: rgba(255,255,255,0.25);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        
        .wa-button:hover .name {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        
        .arrow {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }
        
        .wa-button:hover .arrow {
            transform: translateX(5px);
        }
        
        /* Divider */
        .divider {
            margin: 25px 0;
            position: relative;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #25D366;
            border-radius: 50%;
            animation: dotPulse 1.5s infinite;
        }
        
        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes dotPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }
        
        /* Note */
        .note {
            margin-top: 25px;
            font-size: 11px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .note span {
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        
        /* Ribbon Decoration */
        .ribbon {
            position: absolute;
            top: 20px;
            right: -30px;
            background: #25D366;
            color: white;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 2;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            
            .button-left {
                gap: 10px;
            }
            
            .button-left i {
                font-size: 1.3rem;
            }
            
            .name {
                padding: 4px 12px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background Ornaments -->
    <div class="bg-ornament">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
    </div>
    
    <!-- Main Card -->
    <div class="card">
        <div class="ribbon">✨ ACTIVE ✨</div>
        <div class="logo">⭐</div>
        <h1>REXZ HUB</h1>
        <div class="subtitle">Connect With Us</div>
        
        <!-- Rexz Button -->
        <a href="https://wa.me/6288989208953?text=Halo%20Rexz%2C%20saya%20ingin%20bertanya%20tentang%20Rexz%20Hub" 
           class="wa-button" target="_blank">
            <div class="button-left">
                <i>💬</i>
                <span>+62 889-8920-8953</span>
            </div>

            <div class="arrow">→</div>
        </a>
        
        <!-- Rilz Button -->
        <a href="https://wa.me/6282245252901?text=Halo%20Rilz%2C%20saya%20ingin%20bertanya%20tentang%20Rexz%20Hub" 
           class="wa-button" target="_blank">
            <div class="button-left">
                <i>💬</i>
                <span>+62 822-4525-2901</span>

        </a>
        
        <div class="divider">
            <div class="dot"></div>

        <div class="note">
            <span>⚡</span> Klik tombol untuk chat via WhatsApp <span>⚡</span>

        </div>
    </div>
    
    <script>
        // Create floating particles
        function createParticles() {
            const body = document.querySelector('.bg-ornament');
            for(let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = 8 + Math.random() * 5 + 's';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                body.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>
</html>
